wandb:
  entity: null
  resume: 'auto'



experiment:
    project: "rl_trado_with_value_exopd"  # need to be same of this file name
    function: "train" # no need to change
    start_from_scratch: True # set to True by default, if you stopped the training, and want to keep training with your ckpt model.optimized_name, set to False, and set current_epoch to the last step you stopped   
    total_step: 40
    save_every: 10
    eval_every: 10
    train_value_every: 1
    current_epoch: 1
    deepspeed_file: "1_node_8_gpus_deepspeed_zero2"
    num_node: 1
    node_index: 0

# ExOPD paper: teacher = RL-trained policy (π*); π_ref = reference for reward & KL. J = E[ λ log(π*/π_ref) - KL(π_θ||π_ref) ].
model:
    # Student base (same as when training teacher). Student is trained to match teacher with reward extrapolation.
    pretrained_model: "/data/share/SDAR-4B-Chat"
    value_base_model: "/data/share/SDAR-4B-Chat"
    # Teacher π*: RL-trained policy (required). Path relative to repo root (rl.py runs train from repo root).
    teacher_model: "/data/250010207/dLLM-RL/rl_trado_with_value/ckpt/epoch-40-policy"  # or "rl_trado_with_value/ckpt/optimized"
    # π_ref: null = student base (paper default for same-size / multi-teacher). Or teacher base path for strong-to-weak reward correction.
    reference_model: null
    optimized_name: "optimized" # output name for distilled student
    optimized_value_name: "optimized_value"
    model_base: "trado"



dataset:
    train_dataset: "MATH_train" # "MATH_train""PrimeIntellect"
    optimization_data: "rl_data" # name of the rollout data output
    data_type: "math" # "math" "code" 

# also see explanations in eval configs
rollout:
    tensor_parallel_size: 1 # set to 1 by default, if oom, try reduce max_active first, if still oom, set tensor_parallel_size to 8
    max_active: 256
    num_task_per_step: 64
    num_response_per_task: 16
    temperature: 1.0
    max_token: 2000
    block_size: 4
    denoising_steps_per_block: 4
    top_p: 1.0
    top_k: 0
    remasking_strategy: "low_confidence_dynamic" #"low_confidence_static""low_confidence_dynamic"
    dynamic_threshold: 0.9 # no use for "low_confidence_static"
    start_with_think: False

execute:
    num_chunk: 128 # batch size of executing codes in coding eval tasks

training:
    gradient_checkpointing_enable: True
    gradient_accumulation_steps: 32
    batch_size_lm: 1
    mixed_precision: "bf16"
    enable_tf32: True
    seed: 10086
    num_train_epochs: 1
    max_grad_norm: 1.0
    method: "ExOPD" # "TraceRL" for teacher RL; "ExOPD" for paper-style distillation (requires teacher_model)
    block_size: 4
    shrink: 1
    post_num: 0
    max_gen_length: 2000
    max_prompt_len: 784
    eps: 0.20
    beta: 0.0   # ExOPD paper: only KL(π_θ||π_ref), no KL to old policy
    gam: 1.0
    lam: 1.0
    use_kl_estimator_k3: True
    # ---------- ExOPD paper (G-OPD): J = E[ λ log(π*/π_ref) - D_KL(π_θ || π_ref) ] ----------
    lambda_exopd: 1.25     # λ: reward scaling. Paper uses 1.25 (reward extrapolation); 1.0=standard OPD
    kl_ref_weight: 1.0     # weight of KL(student||π_ref). Paper uses 1.0


optimizer:
    name: adamw
    params: # default adamw params
        policy_learning_rate: 1e-6
        value_learning_rate: 5e-6
        scale_lr: False # scale learning rate by total batch size
        beta1: 0.9
        beta2: 0.999
        weight_decay: 0.0
        epsilon: 1e-8


lr_scheduler:
    scheduler: "cosine"
    params:
        learning_rate: ${optimizer.params.policy_learning_rate}
        warmup_steps: 0
        min_lr_scale: 1.0


evaluation:
    eval_dataset: "MATH500"  # "MATH500" "LiveCodeBench"
    data_type: "math" # "math" "code"
    tensor_parallel_size: 1
    max_active: 256
    num_response_per_task: 3
    temperature: 1.0
    max_token: 2000
    block_size: 4
    denoising_steps_per_block: 4
    top_p: 1.0
    top_k: [0, 1]
    remasking_strategy: ["low_confidence_dynamic", "low_confidence_static"] #"low_confidence_static""low_confidence_dynamic"
    dynamic_threshold: 0.9 # no use for "low_confidence_static"
    start_with_think: False

# len(top_k) must == len(remasking_strategy)

